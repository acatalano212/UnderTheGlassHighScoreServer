<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Under the Glass – Leaderboard</title>
<link rel="icon" type="image/png" sizes="32x32" href="static/favicon-32.png">
<link rel="icon" type="image/png" sizes="192x192" href="static/favicon-192.png">
<link rel="apple-touch-icon" href="static/apple-touch-icon.png">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0d1117">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Roboto+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
/* ------------------------------------------------------------------ reset */
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{font-size:16px}
body{
  font-family:'Oswald','Impact','Arial Narrow',sans-serif;
  background:#0d1117;
  background-image:radial-gradient(ellipse at 50% 0%,rgba(40,50,70,.35) 0%,transparent 70%);
  color:#ccc;
  height:100vh;
  overflow:hidden;
}
@media(max-width:900px){
  body{overflow:auto;height:auto;-webkit-overflow-scrolling:touch}
}
@media(min-width:901px) and (max-width:1200px){
  body{overflow:auto;height:auto;-webkit-overflow-scrolling:touch}
}

/* ------------------------------------------------------------- top banner */
.banner{
  width:100%;
  background:linear-gradient(180deg,#161b22 0%,#0d1117 100%);
  border-bottom:2px solid rgba(255,255,255,.06);
  padding:1.2rem 2rem;
  display:flex;
  align-items:center;
  justify-content:space-between;
  flex-wrap:wrap;
  gap:.5rem;
}
.banner-brand{
  display:flex;align-items:center;gap:.6rem;
  flex:0 0 150px;
}
.banner-brand .brand-logo{height:75px;object-fit:contain}
.banner-center{text-align:center;flex:1 1 auto}
.banner-center .location{
  font-size:1.3rem;font-weight:700;letter-spacing:.22em;text-transform:uppercase;color:#8b949e;
}
.banner-center .lb-title{
  font-size:2.1rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:#e6edf3;
}
.banner-right{
  font-size:.85rem;color:#8b949e;letter-spacing:.08em;text-align:right;
  flex:0 0 150px;
}

/* ------------------------------------------------------------------ grid */
.grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:1.4rem;
  padding:1.6rem 2rem 3rem;
  max-width:2200px;
  margin:0 auto;
}
@media(max-width:1400px){
  .grid{grid-template-columns:repeat(2,1fr)}
}
@media(max-width:900px){
  .grid{grid-template-columns:1fr;padding:1rem}
  .banner{padding:1rem}
}

/* ----------------------------------------------------------- game cards */
.game-card{
  background:rgba(255,255,255,.03);
  border-radius:12px;
  overflow:hidden;
  border:1px solid rgba(255,255,255,.06);
  display:flex;flex-direction:column;
  height:390px;
  cursor:pointer;
  transition:border-color .2s, transform .15s;
}
.game-card:hover{
  border-color:rgba(255,255,255,.18);
  transform:scale(1.01);
}
.game-card .scores-list{
  flex:1;overflow:hidden;
}

/* card header */
.card-header{
  position:relative;
  height:110px;
  display:flex;
  align-items:center;
  padding:0 1.5rem;
  overflow:hidden;
}
.card-header .bg{
  position:absolute;inset:0;
  background-size:cover;background-position:center;
}
.card-header .overlay{
  position:absolute;inset:0;
  background:linear-gradient(90deg,rgba(0,0,0,.15) 0%,rgba(0,0,0,.45) 50%,rgba(0,0,0,.7) 100%);
}
.card-header .content{
  position:relative;z-index:1;
  display:flex;align-items:center;gap:1rem;width:100%;
}
.card-header .title-group{
  display:flex;flex-direction:column;justify-content:center;
}
.card-header .game-logo{
  width:72px;height:72px;border-radius:8px;object-fit:contain;
  background:rgba(0,0,0,.4);flex-shrink:0;
  filter:drop-shadow(0 0 4px rgba(255,255,255,.7)) drop-shadow(0 0 8px rgba(255,255,255,.3));
}
.card-header .title-text{
  font-size:1.8rem;font-weight:700;color:#fff;
  text-transform:uppercase;letter-spacing:.1em;
  text-shadow:0 2px 8px rgba(0,0,0,.7);
}
.card-header .subtitle-text{
  font-size:.9rem;font-weight:400;color:rgba(255,255,255,.8);
  letter-spacing:.05em;margin-top:4px;
  text-shadow:0 1px 4px rgba(0,0,0,.7);
}
.card-header .mfg-logo{
  position:absolute;top:50%;right:1.5rem;z-index:2;
  height:72px;width:auto;opacity:.7;
  transform:translateY(-50%);
  filter:drop-shadow(0 0 4px rgba(255,255,255,.7)) drop-shadow(0 0 8px rgba(255,255,255,.3));
}

/* ---------------------------------------------------------- score rows */
.score-row{
  display:flex;align-items:center;gap:.7rem;
  padding:.55rem 1rem;
  border-bottom:1px solid rgba(255,255,255,.08);
  transition:background .15s;
}
.score-row:last-child{border-bottom:none}
.score-row:hover{background:rgba(255,255,255,.05)}
.score-row.all-access{
  outline:1px solid rgba(255,215,0,.45);
  outline-offset:-1px;
  border-radius:6px;
}

.rank-num{
  width:28px;text-align:center;
  font-size:1rem;font-weight:600;color:#888;flex-shrink:0;
}

.avatar{
  width:34px;height:34px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:.75rem;font-weight:700;color:#fff;flex-shrink:0;
  text-transform:uppercase;letter-spacing:.02em;
  overflow:hidden;
}
.avatar img{width:100%;height:100%;object-fit:cover;border-radius:50%}

.username{
  flex:1 1 auto;
  font-size:.95rem;font-weight:600;letter-spacing:.04em;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
}

.score-val{
  font-family:'Roboto Mono','Courier New',monospace;
  font-size:.95rem;font-weight:600;color:#fff;
  white-space:nowrap;
}

/* ------------------------------------------------------------ footer */
.page-footer{
  text-align:center;padding:1rem;
  font-size:.7rem;color:#484f58;letter-spacing:.06em;
}

/* loading state */
.loading{
  text-align:center;padding:4rem;
  font-size:1.2rem;color:#8b949e;
  grid-column:1/-1;
}

/* --------------------------------------------------------- carousel */
.carousel-page{
  display:none;
  grid-template-columns:repeat(2,1fr);
  gap:1.4rem;
}
.carousel-page.active{
  display:grid;
}
.carousel-container{
  position:relative;
  padding:1.6rem 2rem 3rem;
  max-width:2200px;
  margin:0 auto;
  opacity:1;
  transition:opacity .4s ease-in-out;
}
.carousel-container.fading{
  opacity:0;
}
@media(max-width:1400px){
  .carousel-page{grid-template-columns:repeat(2,1fr)}
}
@media(max-width:900px){
  .carousel-page{grid-template-columns:1fr;display:grid !important}
  .carousel-container{padding:1rem}
  .carousel-dots{display:none}
  .carousel-container.fading{opacity:1}
  .banner{padding:1rem}
  .card-header .mfg-logo{display:none}
}

/* carousel dots */
.carousel-dots{
  display:flex;justify-content:center;gap:.5rem;
  padding:.5rem 0 1rem;
}
.carousel-dot{
  width:10px;height:10px;border-radius:50%;
  background:rgba(255,255,255,.2);
  transition:background .3s;
}
.carousel-dot.active{background:#e6edf3}
@media(max-width:900px){
  .carousel-dots{display:none !important}
}

/* --------------------------------------------------------- detail view */
.detail-view{
  width:100%;
  margin:0;
  padding:0 2rem 0;
  padding-top:10px;
  opacity:1;
  transition:opacity 0.5s ease;
  box-sizing:border-box;
  overflow:hidden;
  max-height:calc(100vh - 80px);
}
.detail-view.fading{opacity:0}
.detail-back{
  display:inline-flex;align-items:center;gap:.4rem;
  color:#8b949e;font-size:.95rem;font-weight:600;
  letter-spacing:.06em;cursor:pointer;
  margin-bottom:.8rem;
  transition:color .2s;
}
.detail-back:hover{color:#e6edf3}

/* 3-column detail layout: machine | header+scores | about */
.detail-body{
  display:grid;
  grid-template-columns:25% 1fr 25%;
  gap:1.5rem;
  align-items:start;
  justify-items:center;
  height:calc(100vh - 120px);
  overflow:hidden;
}
.detail-machine{
  display:flex;
  align-items:flex-start;
  justify-content:center;
  padding:0.5rem 0;
  overflow:hidden;
  height:100%;
}
.detail-machine img{
  max-width:100%;
  max-height:100%;
  height:auto;
  display:block;
  object-fit:contain;
  filter:drop-shadow(0 4px 24px rgba(0,0,0,.6)) drop-shadow(0 0 60px rgba(255,255,255,.06));
}

/* CENTER: header + scores stacked */
.detail-center{
  min-width:0;
  width:100%;
  display:flex;
  flex-direction:column;
  max-height:calc(100vh - 120px);
  overflow:hidden;
}
.detail-header{
  position:relative;
  height:185px;
  display:flex;
  align-items:center;
  padding:0 2rem;
  overflow:hidden;
  border-radius:10px 10px 0 0;
  border:1px solid rgba(255,255,255,.06);
  border-bottom:none;
}
.detail-header .bg{
  position:absolute;inset:0;
  background-size:cover;background-position:center;
}
.detail-header .overlay{
  position:absolute;inset:0;
  background:linear-gradient(90deg,rgba(0,0,0,.15) 0%,rgba(0,0,0,.45) 50%,rgba(0,0,0,.7) 100%);
}
.detail-header .content{
  position:relative;z-index:1;
  display:flex;align-items:center;gap:1.5rem;width:100%;
}
.detail-header .title-group{
  display:flex;flex-direction:column;justify-content:center;
}
.detail-header .game-logo{
  width:110px;height:110px;border-radius:10px;object-fit:contain;
  background:rgba(0,0,0,.4);flex-shrink:0;
  filter:drop-shadow(0 0 4px rgba(255,255,255,.7)) drop-shadow(0 0 8px rgba(255,255,255,.3));
}
.detail-header .title-text{
  font-size:2.6rem;font-weight:700;color:#fff;
  text-transform:uppercase;letter-spacing:.1em;
  text-shadow:0 2px 8px rgba(0,0,0,.7);
}
.detail-header .subtitle-text{
  font-size:1.15rem;font-weight:400;color:rgba(255,255,255,.8);
  letter-spacing:.05em;margin-top:6px;
  text-shadow:0 1px 4px rgba(0,0,0,.7);
}
.detail-header .mfg-logo{
  position:absolute;top:50%;right:2rem;z-index:2;
  height:100px;width:auto;opacity:.7;
  transform:translateY(-50%);
  filter:drop-shadow(0 0 4px rgba(255,255,255,.7)) drop-shadow(0 0 8px rgba(255,255,255,.3));
}
.detail-scores-wrap{
  background:rgba(255,255,255,.03);
  border:1px solid rgba(255,255,255,.06);
  border-radius:0 0 10px 10px;
  overflow:hidden;
}
.detail-scores .score-row{
  padding:.55rem 1.5rem;
  font-size:1.05rem;
}
.detail-scores .rank-num{
  width:32px;font-size:1.1rem;
}
.detail-scores .avatar{
  width:38px;height:38px;font-size:.9rem;
}
.detail-scores .score-val{
  font-size:1.05rem;
}
.detail-updated{
  text-align:center;
  color:#888;
  font-size:0.75rem;
  padding:0.5rem 0 0.25rem;
  font-style:italic;
  letter-spacing:0.3px;
}

/* RIGHT: About the game */
.detail-about{
  padding:0 .5rem;
  font-family:'Oswald',sans-serif;
  display:flex;
  flex-direction:column;
  gap:.6rem;
  width:100%;
  max-height:calc(100vh - 90px);
  overflow:hidden;
  min-width:0;
}
.detail-about-title{
  font-size:1.4rem;font-weight:700;text-transform:uppercase;
  letter-spacing:.12em;color:#58a6ff;
  padding-bottom:.5rem;border-bottom:2px solid rgba(255,255,255,.1);
}
.detail-about-desc{
  font-size:1.15rem;color:#bbb;line-height:1.55;
  font-family:'Oswald',sans-serif;
}
.detail-about-section{
  margin-top:.3rem;
}
.detail-about-section-title{
  font-size:1.1rem;font-weight:700;text-transform:uppercase;
  letter-spacing:.1em;color:#8b949e;margin-bottom:.4rem;
}
.detail-about-features{
  font-size:1.1rem;color:#bbb;line-height:1.55;
  font-family:'Oswald',sans-serif;
}
.detail-about-year{
  font-size:1.2rem;color:#f0c040;font-weight:700;
}
.detail-credits{
  list-style:none;padding:0;margin:0;
}
.detail-credits li{
  padding:.25rem 0;
  font-size:1.05rem;
  border-bottom:1px solid rgba(255,255,255,.04);
  display:flex;gap:.5rem;
}
.detail-credits li:last-child{border-bottom:none}
.credit-role{
  color:#8b949e;font-weight:600;min-width:100px;flex-shrink:0;
  text-transform:uppercase;font-size:.9rem;letter-spacing:.05em;
  padding-top:2px;
}
.credit-name{
  color:#ccc;
}
/* Did You Know callout */
.detail-funfact{
  background:rgba(88,166,255,.06);
  border:1px solid rgba(88,166,255,.15);
  border-radius:8px;
  padding:.6rem 1rem;
  margin-top:.4rem;
}
.detail-funfact-title{
  font-size:1rem;font-weight:700;text-transform:uppercase;
  letter-spacing:.1em;color:#58a6ff;margin-bottom:.3rem;
  font-family:'Oswald',sans-serif;
}
.detail-funfact-text{
  font-size:1rem;color:#bbb;line-height:1.45;
  font-family:'Oswald',sans-serif;
  font-style:italic;
}
/* Buy/Rent promo callout */
.detail-promo{
  background:rgba(46,204,113,.06);
  border:1px solid rgba(46,204,113,.18);
  border-radius:8px;
  padding:.5rem .8rem;
  margin-top:.4rem;
  display:flex;align-items:center;gap:.7rem;
}
.detail-promo-title{
  flex-shrink:0;line-height:0;
  width:70px;text-align:center;
}
.detail-promo-title img{
  height:40px;width:auto;
  filter:drop-shadow(0 0 4px rgba(255,255,255,.3));
}
.detail-promo-text{
  font-size:1.05rem;color:#ccc;line-height:1.4;
  font-family:'Oswald',sans-serif;
  font-weight:700;
}
/* JSPL promo callout */
.detail-jspl-promo{
  background:rgba(218,165,32,.06);
  border:1px solid rgba(218,165,32,.22);
  border-radius:8px;
  padding:.5rem .8rem;
  margin-top:.4rem;
  display:flex;align-items:center;gap:.7rem;
}
.detail-jspl-promo-title{
  flex-shrink:0;line-height:0;
  width:70px;text-align:center;
}
.detail-jspl-promo-title img{
  height:40px;width:auto;
  filter:drop-shadow(0 0 6px rgba(218,165,32,.4));
}
.detail-jspl-promo-text{
  font-size:1.05rem;color:#ccc;line-height:1.4;
  font-family:'Oswald',sans-serif;
  font-weight:700;
}
/* Side-by-side leaderboards — tab layout on all views */
.lb-tabs{
  display:flex;
  gap:0;
  border-bottom:2px solid rgba(255,255,255,.1);
  margin:0 1rem;
}
.lb-tab{
  flex:1;
  text-align:center;
  padding:.7rem 0;
  font-size:1.1rem;
  font-weight:700;
  text-transform:uppercase;
  letter-spacing:.1em;
  cursor:pointer;
  color:#8b949e;
  border-bottom:3px solid transparent;
  margin-bottom:-2px;
  transition:color .2s, border-color .2s;
  font-family:'Oswald',sans-serif;
}
.lb-tab.active-alltime{color:#f0c040;border-bottom-color:#f0c040}
.lb-tab.active-monthly{color:#58a6ff;border-bottom-color:#58a6ff}
.lb-columns{
  flex-direction:column;
  padding:0.8rem 1rem 0;
  gap:0;
  display:flex;
}
.lb-column{
  flex:1;min-width:0;
  display:none;
}
.lb-column.lb-col-active{display:block}
.lb-column-title{display:none}
.lb-gc-row{
  background:linear-gradient(90deg,rgba(240,192,64,.08),rgba(240,192,64,.02));
  border-bottom:1px solid rgba(240,192,64,.15);
}
.lb-gc-row .rank-num{
  color:#f0c040 !important;font-weight:800;
}
.lb-gc-label{
  font-size:.6rem;font-weight:700;text-transform:uppercase;letter-spacing:.15em;
  color:#f0c040;opacity:.7;
}


/* ---------- Tablet landscape (iPad) ---------- */
@media(min-width:901px) and (max-width:1200px){
  .detail-view{
    overflow-y:auto;
    -webkit-overflow-scrolling:touch;
    max-height:none;
  }
  .detail-body{
    grid-template-columns:1fr 30%;
    height:auto;
    overflow:visible;
    gap:1rem;
  }
  .detail-machine{display:none !important}
  .detail-center{
    max-height:none;
    overflow:visible;
  }
  .detail-about{
    max-height:none;
    overflow:visible;
  }
  .detail-scores-wrap{overflow:visible}
  .detail-header{height:160px}
  .detail-header .game-logo{width:80px;height:80px}
  .detail-header .title-text{font-size:2rem}
  .detail-header .subtitle-text{font-size:1rem}
}

/* ---------- Mobile detail responsive ---------- */
@media(max-width:900px){
  .detail-view{
    padding:20px 1rem 0;
    max-height:none;
    overflow-y:auto;
    -webkit-overflow-scrolling:touch;
  }
  .detail-body{
    grid-template-columns:1fr !important;
    height:auto;
    overflow:visible;
    gap:.8rem;
  }
  .detail-machine{display:none !important}
  .detail-center{
    max-height:none;
    overflow:visible;
    order:1;
  }
  .detail-about{
    max-height:none;
    overflow:visible;
    order:2;
  }
  .detail-header{
    height:140px;
    padding:0 1rem;
  }
  .detail-header .game-logo{
    width:60px;height:60px;
  }
  .detail-header .title-text{
    font-size:1.4rem;
  }
  .detail-header .subtitle-text{
    font-size:.85rem;
  }
  .detail-header .mfg-logo{
    display:none !important;
  }
  /* Tab toggle — just adjust sizing for mobile */
  .lb-tab{
    font-size:1rem;
    padding:.6rem 0;
  }
  .lb-columns{
    padding:0.5rem .5rem 0;
  }
  /* Scores sizing for mobile */
  .detail-scores .score-row{
    padding:.5rem .8rem;
    font-size:.95rem;
  }
  .detail-scores .avatar{
    width:32px;height:32px;font-size:.8rem;
  }
  .detail-about-title{font-size:1.2rem}
  .detail-about-desc{font-size:1rem}
  .detail-funfact-text{font-size:.95rem}
  .detail-funfact-title{font-size:.95rem}
  .detail-promo-text{font-size:1.05rem}
  .detail-promo-title img{height:30px}
  .detail-promo-title{width:50px}
  .detail-jspl-promo-text{font-size:1.05rem}
  .detail-jspl-promo-title img{height:30px}
  .detail-jspl-promo-title{width:50px}
  .detail-jspl-promo{margin-bottom:1rem}
  .detail-promo,.detail-jspl-promo{gap:1rem}
  .score-row{pointer-events:none;-webkit-user-select:none;user-select:none}
  .score-row:hover{background:none}
  /* Banner responsive */
  .banner{padding:.5rem 1rem}
  .brand-logo{max-height:40px !important}
  .banner-center .location{font-size:.8rem}
  .banner-center .lb-title{font-size:1.1rem}
}

/* ---------- 4K / Ultra HD scaling (3840×2160+) ---------- */

</style>
</head>
<body>

<!-- ============================================================ BANNER -->
<div class="banner">
  <div class="banner-brand">
    <img src="static/utg-logo.png" alt="Under the Glass" class="brand-logo" onclick="if(displayMode==='detail-cycle')return;hideDetail()" style="cursor:pointer">
  </div>
  <div class="banner-center">
    <div class="location">UNDER THE GLASS</div>
    <div class="lb-title" id="lb-title">Loading...</div>
  </div>
  <div class="banner-right" id="date-range"></div>
</div>

<!-- ============================================================= GRID -->
<div class="carousel-container" id="carousel-container">
  <div class="loading">Loading leaderboard data…</div>
</div>
<div class="carousel-dots" id="carousel-dots"></div>

<!-- Detail view (hidden by default) -->
<div class="detail-view" id="detail-view" style="display:none"></div>

<a href="/admin.html" class="admin-cog" title="Admin">⚙</a>
<style>
.admin-cog{font-size:1rem;color:rgba(255,255,255,.06);text-decoration:none;transition:color .2s;
  position:fixed;bottom:1rem;right:1rem;z-index:100}
.admin-cog:hover{color:rgba(255,255,255,.4)}
</style>

<script>
// Scale the entire page proportionally based on screen width.
// Designed at 1920px — zoom scales everything uniformly so the layout
// looks identical at 1080p, 1440p, 2160p, or any resolution.
(function(){
  var z = screen.width / 1920;
  if (z > 1) {
    if ('zoom' in document.documentElement.style) {
      document.documentElement.style.zoom = z;
    } else {
      // Firefox fallback: use CSS transform
      document.documentElement.style.transformOrigin = 'top left';
      document.documentElement.style.transform = 'scale(' + z + ')';
      document.documentElement.style.width = (100 / z) + '%';
    }
  }
})();

// JJP game config — artwork and logos for known JJP titles
const JJP_ASSETS = {
  'jjp-hp-we': {
    primary_background: 'static/hp-banner.jpg',
    square_logo: 'static/hp-logo.png',

const DEFAULT_THEME = { colors: ['#888','#aaa','#666','#999','#777','#bbb','#555'] };
function getTheme(gameKey) { return GAME_THEMES[gameKey] || DEFAULT_THEME; }

function getInitials(username) {
  if (!username) return '??';
  const parts = username.trim().split(/[\s._-]+/).filter(Boolean);
  if (parts.length >= 2 && parts[0].length > 0 && parts[parts.length - 1].length > 0) {
    return (parts[0][0] + parts[parts.length - 1][0]).toUpperCase();
  }
  return username.slice(0, 2).toUpperCase();
}

function formatScore(n) {
  if (n == null || isNaN(n)) return '0';
  return Number(n).toLocaleString('en-US');
}

function escapeHtml(str) {
  if (str == null) return '';
  const div = document.createElement('div');
  div.textContent = String(str);
  return div.innerHTML;
}

function sanitizeUrl(url) {
  return url || '';
}

function sanitizeColor(c) {
  if (!c || typeof c !== 'string') return '#888';
  return /^#[0-9a-fA-F]{3,8}$/.test(c) ? c : '#888';
}

function buildSubtitle(game) {
  const parts = [];
  if (game.manufacturer) parts.push(game.manufacturer);
  if (game.edition) parts.push(game.edition);
  return parts.join(' · ');
}

function renderCard(name, game) {
  const isJjp = game.source === 'jjp';
  const gameKey = game.machine_id || game.title_code || name;
  const assets = isJjp ? (JJP_ASSETS[gameKey] || {}) : game;
  const bg = assets.primary_background || game.primary_background || '';
  const logo = assets.square_logo || game.square_logo || '';
  const displayName = game.display_name || name;
  const subtitle = buildSubtitle(game);

  let html = `<div class="game-card" data-game="${escapeHtml(name)}">`;

  // Header
  html += '<div class="card-header">';
  html += `<div class="bg" style="background-image:url('${sanitizeUrl(bg)}')"></div>`;
  html += '<div class="overlay"></div>';
  const mfgLogo = MFG_LOGOS[game.manufacturer] || '';
  if (mfgLogo) {
    html += `<img class="mfg-logo" src="${sanitizeUrl(mfgLogo)}" alt="">`;
  }
  html += '<div class="content">';
  if (logo) {
    html += `<img class="game-logo" src="${sanitizeUrl(logo)}" alt="${escapeHtml(displayName)} logo">`;
  }
  html += '<div class="title-group">';
  html += `<div class="title-text">${escapeHtml(displayName)}</div>`;
  if (subtitle) html += `<div class="subtitle-text">${escapeHtml(subtitle)}</div>`;
  html += '</div></div></div>';

  // Scores — use all-time scores when in alltime mode
  html += '<div class="scores-list">';
  const scoreSource = displayMode === 'alltime' ? (game.alltime_scores || game.scores) : game.scores;
  const scores = (scoreSource || []).slice(0, 5);
  const theme = getTheme(name);
  scores.forEach((s, i) => {
    const allAccess = s.is_all_access ? ' all-access' : '';
    const color = isJjp ? theme.colors[i % theme.colors.length] : sanitizeColor(s.background_color_hex);
    const avatarContent = s.avatar_path
      ? `<img src="${sanitizeUrl(s.avatar_path)}" alt="${escapeHtml(s.username)}">`
      : getInitials(s.username);

    html += `<div class="score-row${allAccess}">`;
    html += `<span class="rank-num">${i + 1}</span>`;
    html += `<span class="avatar" style="background:${color}">${avatarContent}</span>`;
    html += `<span class="username" style="color:${color}">${escapeHtml(s.username)}</span>`;
    html += `<span class="score-val">${formatScore(s.score)}</span>`;
    html += '</div>';
  });

  html += '</div></div>';
  return html;
}

let carouselTimer = null;
let carouselFadeTimer = null;
let currentPage = 0;
let totalPages = 0;
let allGamesData = {}; // store for detail view
let displayMode = 'monthly'; // monthly | alltime | detail-cycle
let detailCycleTimer = null;
let detailFadeTimer = null;
let detailCycleIndex = 0;

function chunkArray(arr, size) {
  const chunks = [];
  for (let i = 0; i < arr.length; i += size) {
    chunks.push(arr.slice(i, i + size));
  }
  return chunks;
}

function showPage(pageIndex) {
  const container = document.getElementById('carousel-container');
  const pages = document.querySelectorAll('.carousel-page');
  const dots = document.querySelectorAll('.carousel-dot');

  // Fade out
  container.classList.add('fading');
  if (carouselFadeTimer) clearTimeout(carouselFadeTimer);
  carouselFadeTimer = setTimeout(() => {
    carouselFadeTimer = null;
    pages.forEach((p, i) => p.classList.toggle('active', i === pageIndex));
    dots.forEach((d, i) => d.classList.toggle('active', i === pageIndex));
    currentPage = pageIndex;
    container.classList.remove('fading');
  }, 400);
}

function stopCarousel() {
  if (carouselTimer) { clearInterval(carouselTimer); carouselTimer = null; }
  if (carouselFadeTimer) { clearTimeout(carouselFadeTimer); carouselFadeTimer = null; }
}

function startCarousel() {
  stopCarousel();
  if (totalPages <= 1) return;
  carouselTimer = setInterval(() => {
    const next = (currentPage + 1) % totalPages;
    showPage(next);
  }, 5000);
}

  html += '</div>';
  html += '</div>'; // end detail-about

  html += '</div>'; // end detail-body

  // Hide carousel, show detail
  document.getElementById('carousel-container').style.display = 'none';
  document.getElementById('carousel-dots').style.display = 'none';
  const detailView = document.getElementById('detail-view');
  detailView.innerHTML = html;
  detailView.style.display = 'block';
  // Track current game and cycle state for swipe
  detailView.dataset.currentGame = name;
  detailView.dataset.autoCycle = isAutoCycle ? 'true' : 'false';
}

// Mobile leaderboard tab toggle
function switchLbTab(el) {
  const col = el.dataset.col;
  document.querySelectorAll('.lb-tab').forEach(t => {
    t.className = 'lb-tab';
  });
  el.classList.add(col === 'alltime' ? 'active-alltime' : 'active-monthly');
  document.querySelectorAll('.lb-column').forEach(c => c.classList.remove('lb-col-active'));
  const target = document.getElementById('lb-col-' + col);
  if (target) target.classList.add('lb-col-active');
}

// Mobile swipe navigation (set up once on page load)
(function initSwipe() {
  let touchStartX = 0;
  let touchStartY = 0;
  let swipeTimer = null;
  const dv = document.getElementById('detail-view');
  dv.addEventListener('touchstart', (e) => {
    touchStartX = e.changedTouches[0].screenX;
    touchStartY = e.changedTouches[0].screenY;
  }, { passive: true });
  dv.addEventListener('touchend', (e) => {
    const dx = e.changedTouches[0].screenX - touchStartX;
    const dy = e.changedTouches[0].screenY - touchStartY;
    if (Math.abs(dx) < 50 || Math.abs(dy) > Math.abs(dx)) return;
    const currentGame = dv.dataset.currentGame;
    if (!currentGame || sortedGameKeys.length === 0) return;
    const idx = sortedGameKeys.indexOf(currentGame);
    if (idx === -1) return;
    let nextIdx;
    if (dx < 0) { // swipe left = next game
      nextIdx = (idx + 1) % sortedGameKeys.length;
    } else { // swipe right = prev game
      nextIdx = (idx - 1 + sortedGameKeys.length) % sortedGameKeys.length;
    }
    // Stop auto-cycle if running
    stopDetailCycle();
    // Preserve the isAutoCycle state from current view
    const wasAutoCycle = dv.dataset.autoCycle === 'true';
    if (swipeTimer) clearTimeout(swipeTimer);
    dv.classList.add('fading');
    swipeTimer = setTimeout(() => {
      swipeTimer = null;
      showDetail(sortedGameKeys[nextIdx], wasAutoCycle);
      dv.classList.remove('fading');
    }, 300);
  }, { passive: true });
})();

function hideDetail() {
  stopDetailCycle();
  document.getElementById('detail-view').style.display = 'none';
  document.getElementById('carousel-container').style.display = '';
  document.getElementById('carousel-dots').style.display = '';
  startCarousel();
}

function stopDetailCycle() {
  if (detailCycleTimer) { clearInterval(detailCycleTimer); detailCycleTimer = null; }
  if (detailFadeTimer) { clearTimeout(detailFadeTimer); detailFadeTimer = null; }
}

function startDetailCycle() {
  stopDetailCycle();
  if (sortedGameKeys.length === 0) return;
  detailCycleIndex = 0;
  showDetail(sortedGameKeys[0], true);
  detailCycleTimer = setInterval(() => {
    const detailView = document.getElementById('detail-view');
    detailView.classList.add('fading');
    if (detailFadeTimer) clearTimeout(detailFadeTimer);
    detailFadeTimer = setTimeout(() => {
      detailFadeTimer = null;
      detailCycleIndex = (detailCycleIndex + 1) % sortedGameKeys.length;
      showDetail(sortedGameKeys[detailCycleIndex], true);
      detailView.classList.remove('fading');
    }, 500);
  }, 10000);
}

async function loadDashboard() {
  try {
    // Fetch config for display mode
    try {
      const cfgResp = await fetch('/api/config');
      const cfgData = await cfgResp.json();
      displayMode = cfgData.displayMode || 'monthly';
    } catch {}

    const resp = await fetch('/api/scores');
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const data = await resp.json();

    // Update banner based on mode
    const modeLabels = {
      'monthly': data.leaderboard?.title || 'Leaderboard',
      'alltime': 'All Time Leaderboard',
      'detail-cycle': 'Leaderboard',
    };
    document.getElementById('lb-title').textContent = modeLabels[displayMode] || data.leaderboard?.title;
    document.getElementById('date-range').textContent = displayMode === 'monthly' ? (data.leaderboard?.date_range || '') : '';

    // Collect all game cards — alphabetical order
    const games = data.games || {};
    allGamesData = games;
    const sorted = Object.entries(games).sort(([kA, a], [kB, b]) => {
      return (a.display_name || kA).localeCompare(b.display_name || kB);
    });
    sortedGameKeys = sorted.map(([k]) => k);

    // Detail-cycle mode: auto-rotate through detail pages
    if (displayMode === 'detail-cycle') {
      document.getElementById('carousel-container').style.display = 'none';
      document.getElementById('carousel-dots').style.display = 'none';
      stopCarousel();
      // Only start cycle if not already running — preserve position across refreshes
      if (!detailCycleTimer) {
        startDetailCycle();
      } else {
        // Refresh current game with updated data without resetting position
        showDetail(sortedGameKeys[detailCycleIndex % sortedGameKeys.length], true);
      }
    } else {
      // Carousel mode (monthly or alltime)
      stopDetailCycle();
      document.getElementById('detail-view').style.display = 'none';
      document.getElementById('carousel-container').style.display = '';
      document.getElementById('carousel-dots').style.display = '';

      // Build card HTML for each game
      const cards = sorted.map(([name, game]) => renderCard(name, game));

      // Chunk into pages of 4
      const pages = chunkArray(cards, 4);
      totalPages = pages.length;

      // Build carousel HTML
      const container = document.getElementById('carousel-container');
      let html = '';
      pages.forEach((page, i) => {
        html += `<div class="carousel-page${i === 0 ? ' active' : ''}">`;
        html += page.join('');
        html += '</div>';
      });
      container.innerHTML = html || '<div class="loading">No games found</div>';

      // Build dots (desktop only)
      const dotsContainer = document.getElementById('carousel-dots');
      if (window.innerWidth > 900) {
        let dotsHtml = '';
        for (let i = 0; i < totalPages; i++) {
          dotsHtml += `<div class="carousel-dot${i === 0 ? ' active' : ''}" onclick="showPage(${i}); startCarousel();"></div>`;
        }
        dotsContainer.innerHTML = dotsHtml;
      } else {
        dotsContainer.innerHTML = '';
        dotsContainer.style.display = 'none';
      }

      // Start carousel (desktop only)
      currentPage = 0;
      if (window.innerWidth > 900) {
        startCarousel();
      }
    }

  } catch (err) {
    console.error('Failed to load dashboard:', err);
    const el = document.getElementById('carousel-container');
    el.textContent = '';
    const errDiv = document.createElement('div');
    errDiv.className = 'loading';
    errDiv.textContent = `Error loading data: ${err.message}. Retrying…`;
    el.appendChild(errDiv);
  }
}

// Click delegation for game cards (disabled on mobile — use swipe instead)
document.addEventListener('click', (e) => {
  const card = e.target.closest('.game-card');
  if (card && card.dataset.game) {
    if (window.innerWidth <= 900) return;
    showDetail(card.dataset.game);
  }
});

// Initial load + auto-refresh
let refreshTimer = null;
loadDashboard();
refreshTimer = setInterval(loadDashboard, 60000);

// Register service worker for PWA
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js').catch(() => {});
}
</script>
