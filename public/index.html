<link rel="icon" type="image/png" sizes="32x32" href="static/favicon-32.png">
<link rel="icon" type="image/png" sizes="192x192" href="static/favicon-192.png">

<style>
/* ------------------------------------------------------------------ reset */
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{font-size:16px}
body{
  font-family:'Oswald','Impact','Arial Narrow',sans-serif;
  background:#0d1117;
  background-image:radial-gradient(ellipse at 50% 0%,rgba(40,50,70,.35) 0%,transparent 70%);
  color:#ccc;
  min-height:100vh;
}

/* ------------------------------------------------------------- top banner */
.banner{
  width:100%;
  background:linear-gradient(180deg,#161b22 0%,#0d1117 100%);
  border-bottom:2px solid rgba(255,255,255,.06);
  padding:1rem 2rem;
  display:flex;
  align-items:center;
  justify-content:space-between;
  flex-wrap:wrap;
  gap:.5rem;
}
.banner-brand{
  display:flex;align-items:center;gap:.6rem;
}
.banner-brand .brand-logo{height:50px;object-fit:contain}
.banner-center{text-align:center;flex:1 1 auto}
.banner-center .location{
  font-size:.95rem;font-weight:700;letter-spacing:.22em;text-transform:uppercase;color:#8b949e;
}
.banner-center .lb-title{
  font-size:1.5rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:#e6edf3;
}
.banner-right{
  font-size:.85rem;color:#8b949e;letter-spacing:.08em;text-align:right;
}

/* ------------------------------------------------------------------ grid */
.grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:1.4rem;
  padding:1.6rem 2rem 3rem;
  max-width:2200px;
  margin:0 auto;
}
@media(max-width:1400px){
  .grid{grid-template-columns:repeat(2,1fr)}
}
@media(max-width:900px){
  .grid{grid-template-columns:1fr;padding:1rem}
  .banner{padding:1rem}
}

/* ----------------------------------------------------------- game cards */
.game-card{
  background:rgba(255,255,255,.03);
  border-radius:12px;
  overflow:hidden;
  border:1px solid rgba(255,255,255,.06);
  display:flex;flex-direction:column;
  height:390px;
  cursor:pointer;
  transition:border-color .2s, transform .15s;
}
.game-card:hover{
  border-color:rgba(255,255,255,.18);
  transform:scale(1.01);
}
.game-card .scores-list{
  flex:1;overflow:hidden;
}

/* card header */
.card-header{
  position:relative;
  height:110px;
  display:flex;
  align-items:center;
  padding:0 1.5rem;
  overflow:hidden;
}
.card-header .bg{
  position:absolute;inset:0;
  background-size:cover;background-position:center;
}
.card-header .overlay{
  position:absolute;inset:0;
  background:linear-gradient(90deg,rgba(0,0,0,.15) 0%,rgba(0,0,0,.45) 50%,rgba(0,0,0,.7) 100%);
}
.card-header .content{
  position:relative;z-index:1;
  display:flex;align-items:center;gap:1rem;width:100%;
}
.card-header .title-group{
  display:flex;flex-direction:column;justify-content:center;
}
.card-header .game-logo{
  width:72px;height:72px;border-radius:8px;object-fit:contain;
  background:rgba(0,0,0,.4);flex-shrink:0;
  filter:drop-shadow(0 0 4px rgba(255,255,255,.7)) drop-shadow(0 0 8px rgba(255,255,255,.3));
}
.card-header .title-text{
  font-size:1.8rem;font-weight:700;color:#fff;
  text-transform:uppercase;letter-spacing:.1em;
  text-shadow:0 2px 8px rgba(0,0,0,.7);
}
.card-header .subtitle-text{
  font-size:.9rem;font-weight:400;color:rgba(255,255,255,.8);
  letter-spacing:.05em;margin-top:4px;
  text-shadow:0 1px 4px rgba(0,0,0,.7);
}
.card-header .mfg-logo{
  position:absolute;top:50%;right:1.5rem;z-index:2;
  height:72px;width:auto;opacity:.7;
  transform:translateY(-50%);
  filter:drop-shadow(0 0 4px rgba(255,255,255,.7)) drop-shadow(0 0 8px rgba(255,255,255,.3));
}

/* ---------------------------------------------------------- score rows */
.score-row{
  display:flex;align-items:center;gap:.7rem;
  padding:.55rem 1rem;
  border-bottom:1px solid rgba(255,255,255,.08);
  transition:background .15s;
}
.score-row:last-child{border-bottom:none}
.score-row:hover{background:rgba(255,255,255,.05)}
.score-row.all-access{
  outline:1px solid rgba(255,215,0,.45);
  outline-offset:-1px;
  border-radius:6px;
}

.rank-num{
  width:28px;text-align:center;
  font-size:1rem;font-weight:600;color:#888;flex-shrink:0;
}

.avatar{
  width:34px;height:34px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:.75rem;font-weight:700;color:#fff;flex-shrink:0;
  text-transform:uppercase;letter-spacing:.02em;
  overflow:hidden;
}
.avatar img{width:100%;height:100%;object-fit:cover;border-radius:50%}

.username{
  flex:1 1 auto;
  font-size:.95rem;font-weight:600;letter-spacing:.04em;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
}

.score-val{
  font-family:'Roboto Mono','Courier New',monospace;
  font-size:.95rem;font-weight:600;color:#fff;
  white-space:nowrap;
}

/* ------------------------------------------------------------ footer */
.page-footer{
  text-align:center;padding:1rem;
  font-size:.7rem;color:#484f58;letter-spacing:.06em;
}

/* loading state */
.loading{
  text-align:center;padding:4rem;
  font-size:1.2rem;color:#8b949e;
  grid-column:1/-1;
}

/* --------------------------------------------------------- carousel */
.carousel-page{
  display:none;
  grid-template-columns:repeat(2,1fr);
  gap:1.4rem;
}
.carousel-page.active{
  display:grid;
}
.carousel-container{
  position:relative;
  padding:1.6rem 2rem 3rem;
  max-width:2200px;
  margin:0 auto;
  opacity:1;
  transition:opacity .4s ease-in-out;
}
.carousel-container.fading{
  opacity:0;
}
@media(max-width:1400px){
  .carousel-page{grid-template-columns:repeat(2,1fr)}
}
@media(max-width:900px){
  .carousel-page{grid-template-columns:1fr;display:grid !important}
  .carousel-container{padding:1rem}
  .carousel-dots{display:none}
  .carousel-container.fading{opacity:1}
  .banner{padding:1rem}
  .card-header .mfg-logo{display:none}
}

/* carousel dots */
.carousel-dots{
  display:flex;justify-content:center;gap:.5rem;
  padding:.5rem 0 1rem;
}
.carousel-dot{
  width:10px;height:10px;border-radius:50%;
  background:rgba(255,255,255,.2);
  transition:background .3s;
}
.carousel-dot.active{background:#e6edf3}
@media(max-width:900px){
  .carousel-dots{display:none !important}
}

/* --------------------------------------------------------- detail view */
.detail-view{
  width:100%;
  margin:0;
  padding:1rem 2rem 2rem;
  opacity:1;
  transition:opacity 0.5s ease;
  box-sizing:border-box;
  overflow:hidden;
}
.detail-view.fading{opacity:0}
.detail-back{
  display:inline-flex;align-items:center;gap:.4rem;
  color:#8b949e;font-size:.95rem;font-weight:600;
  letter-spacing:.06em;cursor:pointer;
  margin-bottom:.8rem;
  transition:color .2s;
}
.detail-back:hover{color:#e6edf3}

/* 3-column detail layout: machine | header+scores | about */
.detail-body{
  display:grid;
  grid-template-columns:30% 1fr 25%;
  gap:1.5rem;
  align-items:start;
  min-height:0;
  overflow:hidden;
}
.detail-machine{
  display:flex;
  align-items:center;
  justify-content:center;
  padding:1rem 0;
}
.detail-machine img{
  max-width:100%;
  max-height:680px;
  height:auto;
  display:block;
  object-fit:contain;
  filter:drop-shadow(0 4px 24px rgba(0,0,0,.6)) drop-shadow(0 0 60px rgba(255,255,255,.06));
}

/* CENTER: header + scores stacked */
.detail-center{
  min-width:0;
  display:flex;
  flex-direction:column;
}
.detail-header{
  position:relative;
  height:130px;
  display:flex;
  align-items:center;
  padding:0 1.5rem;
  overflow:hidden;
  border-radius:10px 10px 0 0;
  border:1px solid rgba(255,255,255,.06);
  border-bottom:none;
}
.detail-header .bg{
  position:absolute;inset:0;
  background-size:cover;background-position:center;
}
.detail-header .overlay{
  position:absolute;inset:0;
  background:linear-gradient(90deg,rgba(0,0,0,.15) 0%,rgba(0,0,0,.45) 50%,rgba(0,0,0,.7) 100%);
}
.detail-header .content{
  position:relative;z-index:1;
  display:flex;align-items:center;gap:1rem;width:100%;
}
.detail-header .title-group{
  display:flex;flex-direction:column;justify-content:center;
}
.detail-header .game-logo{
  width:72px;height:72px;border-radius:8px;object-fit:contain;
  background:rgba(0,0,0,.4);flex-shrink:0;
  filter:drop-shadow(0 0 4px rgba(255,255,255,.7)) drop-shadow(0 0 8px rgba(255,255,255,.3));
}
.detail-header .title-text{
  font-size:1.8rem;font-weight:700;color:#fff;
  text-transform:uppercase;letter-spacing:.1em;
  text-shadow:0 2px 8px rgba(0,0,0,.7);
}
.detail-header .subtitle-text{
  font-size:.9rem;font-weight:400;color:rgba(255,255,255,.8);
  letter-spacing:.05em;margin-top:4px;
  text-shadow:0 1px 4px rgba(0,0,0,.7);
}
.detail-header .mfg-logo{
  position:absolute;top:50%;right:1.5rem;z-index:2;
  height:72px;width:auto;opacity:.7;
  transform:translateY(-50%);
  filter:drop-shadow(0 0 4px rgba(255,255,255,.7)) drop-shadow(0 0 8px rgba(255,255,255,.3));
}
.detail-scores-wrap{
  background:rgba(255,255,255,.03);
  border:1px solid rgba(255,255,255,.06);
  border-radius:0 0 10px 10px;
  overflow:hidden;
}
.detail-scores .score-row{
  padding:.7rem 1.5rem;
  font-size:1.05rem;
}
.detail-scores .rank-num{
  width:32px;font-size:1.1rem;
}
.detail-scores .avatar{
  width:38px;height:38px;font-size:.9rem;
}
.detail-scores .score-val{
  font-size:1.05rem;
}
.detail-updated{
  text-align:center;
  color:#888;
  font-size:0.75rem;
  padding:0.5rem 0 0.25rem;
  font-style:italic;
  letter-spacing:0.3px;
}

/* RIGHT: About the game */
.detail-about{
  background:rgba(255,255,255,.03);
  border-radius:10px;
  padding:1.2rem 1.4rem;
  border:1px solid rgba(255,255,255,.06);
  font-family:'Oswald',sans-serif;
  display:flex;
  flex-direction:column;
  gap:1rem;
  overflow:hidden;
  min-width:0;
}
.detail-about-title{
  font-size:1.15rem;font-weight:700;text-transform:uppercase;
  letter-spacing:.12em;color:#58a6ff;
  padding-bottom:.5rem;border-bottom:2px solid rgba(255,255,255,.1);
}
.detail-about-desc{
  font-size:1rem;color:#bbb;line-height:1.5;
  font-family:'Oswald',sans-serif;
}
.detail-about-section{
  margin-top:.3rem;
}
.detail-about-section-title{
  font-size:.95rem;font-weight:700;text-transform:uppercase;
  letter-spacing:.1em;color:#8b949e;margin-bottom:.4rem;
}
.detail-about-features{
  font-size:.95rem;color:#bbb;line-height:1.5;
  font-family:'Oswald',sans-serif;
}
.detail-about-year{
  font-size:1.05rem;color:#f0c040;font-weight:700;
}
.detail-credits{
  list-style:none;padding:0;margin:0;
}
.detail-credits li{
  padding:.3rem 0;
  font-size:.95rem;
  border-bottom:1px solid rgba(255,255,255,.04);
  display:flex;gap:.5rem;
}
.detail-credits li:last-child{border-bottom:none}
.credit-role{
  color:#8b949e;font-weight:600;min-width:100px;flex-shrink:0;
  text-transform:uppercase;font-size:.8rem;letter-spacing:.05em;
  padding-top:2px;
}
.credit-name{
  color:#ccc;
}
/* Did You Know callout */
.detail-funfact{
  background:rgba(88,166,255,.06);
  border:1px solid rgba(88,166,255,.15);
  border-radius:8px;
  padding:1rem 1.2rem;
  margin-top:.6rem;
}
.detail-funfact-title{
  font-size:.9rem;font-weight:700;text-transform:uppercase;
  letter-spacing:.1em;color:#58a6ff;margin-bottom:.4rem;
  font-family:'Oswald',sans-serif;
}
.detail-funfact-text{
  font-size:.95rem;color:#bbb;line-height:1.5;
  font-family:'Oswald',sans-serif;
  font-style:italic;
}
/* Side-by-side leaderboards */
.lb-columns{
  display:flex;gap:1.2rem;padding:0.8rem 1rem 0;
}
.lb-column{
  flex:1;min-width:0;
}
.lb-column-title{
  font-size:1.1rem;font-weight:700;text-transform:uppercase;
  letter-spacing:.12em;color:#e6edf3;text-align:center;
  padding:.6rem 0;border-bottom:2px solid rgba(255,255,255,.1);
  margin-bottom:.2rem;
}
.lb-column-title.alltime{color:#f0c040}
.lb-column-title.monthly{color:#58a6ff}
.lb-gc-row{
  background:linear-gradient(90deg,rgba(240,192,64,.08),rgba(240,192,64,.02));
  border-bottom:1px solid rgba(240,192,64,.15);
}
.lb-gc-row .rank-num{
  color:#f0c040 !important;font-weight:800;
}
.lb-gc-label{
  font-size:.6rem;font-weight:700;text-transform:uppercase;letter-spacing:.15em;
  color:#f0c040;opacity:.7;
}
</style>
</head>

const DEFAULT_THEME = { colors: ['#888','#aaa','#666','#999','#777','#bbb','#555'] };
function getTheme(gameKey) { return GAME_THEMES[gameKey] || DEFAULT_THEME; }

function getInitials(username) {
  if (!username) return '??';
  const parts = username.trim().split(/[\s._-]+/).filter(Boolean);
  if (parts.length >= 2) return (parts[0][0] + parts[parts.length - 1][0]).toUpperCase();
  return username.slice(0, 2).toUpperCase();
}

function formatScore(n) {
  return n.toLocaleString('en-US');
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function buildSubtitle(game) {
  const parts = [];
  if (game.manufacturer) parts.push(game.manufacturer);
  if (game.edition) parts.push(game.edition);
  return parts.join(' · ');
}

function renderCard(name, game) {
  const isJjp = game.source === 'jjp';
  const gameKey = game.machine_id || game.title_code || name;
  const assets = isJjp ? (JJP_ASSETS[gameKey] || {}) : game;
  const bg = assets.primary_background || game.primary_background || '';
  const logo = assets.square_logo || game.square_logo || '';
  const displayName = game.display_name || name;
  const subtitle = buildSubtitle(game);

  let html = `<div class="game-card" data-game="${escapeHtml(name)}">`;

  // Header
  html += '<div class="card-header">';
  html += `<div class="bg" style="background-image:url('${bg}')"></div>`;
  html += '<div class="overlay"></div>';
  const mfgLogo = MFG_LOGOS[game.manufacturer] || '';
  if (mfgLogo) {
    html += `<img class="mfg-logo" src="${mfgLogo}" alt="">`;
  }
  html += '<div class="content">';
  if (logo) {
    html += `<img class="game-logo" src="${logo}" alt="${escapeHtml(displayName)} logo">`;
  }
  html += '<div class="title-group">';
  html += `<div class="title-text">${escapeHtml(displayName)}</div>`;
  if (subtitle) html += `<div class="subtitle-text">${escapeHtml(subtitle)}</div>`;
  html += '</div></div></div>';

  // Scores — use all-time scores when in alltime mode
  html += '<div class="scores-list">';
  const scoreSource = displayMode === 'alltime' ? (game.alltime_scores || game.scores) : game.scores;
  const scores = (scoreSource || []).slice(0, 5);
  const theme = getTheme(name);
  scores.forEach((s, i) => {
    const allAccess = s.is_all_access ? ' all-access' : '';
    const color = isJjp ? theme.colors[i % theme.colors.length] : (s.background_color_hex || '#888');
    const avatarContent = s.avatar_path
      ? `<img src="${s.avatar_path}" alt="${escapeHtml(s.username)}">`
      : getInitials(s.username);

    html += `<div class="score-row${allAccess}">`;
    html += `<span class="rank-num">${i + 1}</span>`;
    html += `<span class="avatar" style="background:${color}">${avatarContent}</span>`;
    html += `<span class="username" style="color:${color}">${escapeHtml(s.username)}</span>`;
    html += `<span class="score-val">${formatScore(s.score)}</span>`;
    html += '</div>';
  });

  html += '</div></div>';
  return html;
}

let carouselTimer = null;
let currentPage = 0;
let totalPages = 0;
let allGamesData = {}; // store for detail view
let displayMode = 'monthly'; // monthly | alltime | detail-cycle
let detailCycleTimer = null;
let detailCycleIndex = 0;
let sortedGameKeys = [];

function chunkArray(arr, size) {
  const chunks = [];
  for (let i = 0; i < arr.length; i += size) {
    chunks.push(arr.slice(i, i + size));
  }
  return chunks;
}

function showPage(pageIndex) {
  const container = document.getElementById('carousel-container');
  const pages = document.querySelectorAll('.carousel-page');
  const dots = document.querySelectorAll('.carousel-dot');

  // Fade out
  container.classList.add('fading');
  setTimeout(() => {
    // Swap pages while hidden
    pages.forEach((p, i) => p.classList.toggle('active', i === pageIndex));
    dots.forEach((d, i) => d.classList.toggle('active', i === pageIndex));
    currentPage = pageIndex;
    // Fade back in
    container.classList.remove('fading');
  }, 400);
}

function startCarousel() {
  if (carouselTimer) clearInterval(carouselTimer);
  if (totalPages <= 1) return;
  carouselTimer = setInterval(() => {
    const next = (currentPage + 1) % totalPages;
    showPage(next);
  }, 5000);
}

function showDetail(gameName, isAutoCycle) {
  // Pause carousel (but not during auto detail-cycle)
  if (!isAutoCycle && carouselTimer) { clearInterval(carouselTimer); carouselTimer = null; }

  // Find the game data by key
  const entry = Object.entries(allGamesData).find(([k]) => k === gameName);
  if (!entry) return;
  const [name, game] = entry;
  const isJjp = game.source === 'jjp';
  const gameKey = game.machine_id || game.title_code || name;
  const assets = JJP_ASSETS[gameKey] || {};
  const bg = assets.primary_background || game.primary_background || '';
  const logo = assets.square_logo || game.square_logo || '';
  const machineImg = assets.machine || '';
  const displayName = game.display_name || name;
  const subtitle = buildSubtitle(game);
  const info = GAME_INFO[gameKey] || {};

  let html = isAutoCycle ? '' : '<div class="detail-back" onclick="hideDetail()">← Back to Leaderboard</div>';

  // 3-column body: machine image | header+scores | about
  html += '<div class="detail-body">';

  // LEFT: Machine image floating in space
  html += '<div class="detail-machine">';
  if (machineImg) {
    html += `<img src="${machineImg}" alt="${escapeHtml(displayName)}" loading="lazy">`;
  }
  html += '</div>';

  // CENTER: Header + Leaderboards stacked
  html += '<div class="detail-center">';

  // Header
  html += '<div class="detail-header">';
  html += `<div class="bg" style="background-image:url('${bg}')"></div>`;
  html += '<div class="overlay"></div>';
  html += '<div class="content">';
  if (logo) {
    html += `<img class="game-logo" src="${logo}" alt="${escapeHtml(displayName)} logo">`;
  }
  html += '<div class="title-group">';
  html += `<div class="title-text">${escapeHtml(displayName)}</div>`;
  if (subtitle) html += `<div class="subtitle-text">${escapeHtml(subtitle)}</div>`;
  html += '</div>';
  const detailMfgLogo = MFG_LOGOS[game.manufacturer] || '';
  if (detailMfgLogo) {
    html += `<img class="mfg-logo" src="${detailMfgLogo}" alt="">`;
  }
  html += '</div></div>';

  // Scores wrap
  html += '<div class="detail-scores-wrap">';

  // Build score rows helper
  const theme = getTheme(name);
  function buildScoreRows(scoreList, limit) {
    let rows = '';
    const sl = (scoreList || []).slice(0, limit || 11);
    sl.forEach((s, i) => {
      const allAccess = s.is_all_access ? ' all-access' : '';
      const isGC = i === 0;
      const gcClass = isGC ? ' lb-gc-row' : '';
      const color = isJjp ? theme.colors[i % theme.colors.length] : (s.background_color_hex || '#888');
      const avatarContent = s.avatar_path
        ? `<img src="${s.avatar_path}" alt="${escapeHtml(s.username)}">`
        : getInitials(s.username);
      const rankLabel = isGC
        ? '<span class="lb-gc-label">GC</span>'
        : `${i}`;
      rows += `<div class="score-row${allAccess}${gcClass}">`;
      rows += `<span class="rank-num">${rankLabel}</span>`;
      rows += `<span class="avatar" style="background:${color}">${avatarContent}</span>`;
      rows += `<span class="username" style="color:${color}">${escapeHtml(s.username)}</span>`;
      rows += `<span class="score-val">${formatScore(s.score)}</span>`;
      rows += '</div>';
    });
    if (sl.length === 0) rows = '<div style="text-align:center;color:#484f58;padding:1.5rem;font-style:italic">No scores yet</div>';
    return rows;
  }

  const now = new Date();
  const monthLabel = now.toLocaleString('en-US', { month: 'long' });

  // Side-by-side leaderboards
  html += '<div class="lb-columns">';

  // All Time column
  html += '<div class="lb-column">';
  html += '<div class="lb-column-title alltime">All Time</div>';
  html += '<div class="detail-scores">';
  html += buildScoreRows(game.alltime_scores || game.scores, 11);
  html += '</div></div>';

  // Current Month column
  html += '<div class="lb-column">';
  html += `<div class="lb-column-title monthly">${monthLabel}</div>`;
  html += '<div class="detail-scores">';
  html += buildScoreRows(game.scores, 11);
  html += '</div></div>';

  html += '</div>'; // end lb-columns

  // Last-updated footer
  if (game.updated) {
    const d = new Date(game.updated);
    const ts = d.toLocaleString('en-US', { month:'short', day:'numeric', year:'numeric', hour:'numeric', minute:'2-digit', hour12:true });
    html += `<div class="detail-updated">Last Updated: ${ts}</div>`;
  }

  html += '</div>'; // end detail-scores-wrap
  html += '</div>'; // end detail-center

  // RIGHT: About the game
  html += '<div class="detail-about">';
  html += '<div class="detail-about-title">About the Game</div>';
  if (info.year) {
    html += `<div class="detail-about-year">${info.year} · ${escapeHtml(game.manufacturer || '')}</div>`;
  }
  if (info.description) {
    html += `<div class="detail-about-desc">${escapeHtml(info.description)}</div>`;
  }
  if (info.features) {
    html += '<div class="detail-about-section">';
    html += '<div class="detail-about-section-title">Features</div>';
    html += `<div class="detail-about-features">${escapeHtml(info.features)}</div>`;
    html += '</div>';
  }
  if (info.credits && info.credits.length > 0) {
    html += '<div class="detail-about-section">';
    html += '<div class="detail-about-section-title">Credits</div>';
    html += '<ul class="detail-credits">';
    info.credits.forEach(c => {
      html += `<li><span class="credit-role">${escapeHtml(c.role)}</span><span class="credit-name">${escapeHtml(c.name)}</span></li>`;
    });
    html += '</ul>';
    html += '</div>';
  }
  if (info.funFact) {
    html += '<div class="detail-funfact">';
    html += '<div class="detail-funfact-title">Did You Know?</div>';
    html += `<div class="detail-funfact-text">${escapeHtml(info.funFact)}</div>`;
    html += '</div>';
  }
  html += '</div>'; // end detail-about

  html += '</div>'; // end detail-body

  // Hide carousel, show detail
  document.getElementById('carousel-container').style.display = 'none';
  document.getElementById('carousel-dots').style.display = 'none';
  const detailView = document.getElementById('detail-view');
  detailView.innerHTML = html;
  detailView.style.display = 'block';
}

function hideDetail() {
  stopDetailCycle();
  document.getElementById('detail-view').style.display = 'none';
  document.getElementById('carousel-container').style.display = '';
  document.getElementById('carousel-dots').style.display = '';
  startCarousel();
}

function stopDetailCycle() {
  if (detailCycleTimer) { clearInterval(detailCycleTimer); detailCycleTimer = null; }
}

function startDetailCycle() {
  stopDetailCycle();
  if (sortedGameKeys.length === 0) return;
  detailCycleIndex = 0;
  showDetail(sortedGameKeys[0], true);
  detailCycleTimer = setInterval(() => {
    const detailView = document.getElementById('detail-view');
    detailView.classList.add('fading');
    setTimeout(() => {
      detailCycleIndex = (detailCycleIndex + 1) % sortedGameKeys.length;
      showDetail(sortedGameKeys[detailCycleIndex], true);
      detailView.classList.remove('fading');
    }, 500);
  }, 10000);
}

async function loadDashboard() {
  try {
    // Fetch config for display mode
    try {
      const cfgResp = await fetch('/api/config');
      const cfgData = await cfgResp.json();
      displayMode = cfgData.displayMode || 'monthly';
    } catch {}

    const resp = await fetch('/api/scores');
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const data = await resp.json();

    // Update banner based on mode
    const modeLabels = {
      'monthly': data.leaderboard?.title || 'Leaderboard',
      'alltime': 'All Time Leaderboard',
      'detail-cycle': 'Leaderboard',
    };
    document.getElementById('lb-title').textContent = modeLabels[displayMode] || data.leaderboard?.title;
    document.getElementById('date-range').textContent = displayMode === 'monthly' ? (data.leaderboard?.date_range || '') : '';

    // Collect all game cards — alphabetical order
    const games = data.games || {};
    allGamesData = games;
    const sorted = Object.entries(games).sort(([kA, a], [kB, b]) => {
      return (a.display_name || kA).localeCompare(b.display_name || kB);
    });
    sortedGameKeys = sorted.map(([k]) => k);

    // Detail-cycle mode: auto-rotate through detail pages
    if (displayMode === 'detail-cycle') {
      document.getElementById('carousel-container').style.display = 'none';
      document.getElementById('carousel-dots').style.display = 'none';
      if (carouselTimer) { clearInterval(carouselTimer); carouselTimer = null; }
      // Only start cycle if not already running — preserve position across refreshes
      if (!detailCycleTimer) {
        startDetailCycle();
      } else {
        // Refresh current game with updated data without resetting position
        showDetail(sortedGameKeys[detailCycleIndex % sortedGameKeys.length], true);
      }
    } else {
      // Carousel mode (monthly or alltime)
      stopDetailCycle();
      document.getElementById('detail-view').style.display = 'none';
      document.getElementById('carousel-container').style.display = '';
      document.getElementById('carousel-dots').style.display = '';

      // Build card HTML for each game
      const cards = sorted.map(([name, game]) => renderCard(name, game));

      // Chunk into pages of 4
      const pages = chunkArray(cards, 4);
      totalPages = pages.length;

      // Build carousel HTML
      const container = document.getElementById('carousel-container');
      let html = '';
      pages.forEach((page, i) => {
        html += `<div class="carousel-page${i === 0 ? ' active' : ''}">`;
        html += page.join('');
        html += '</div>';
      });
      container.innerHTML = html || '<div class="loading">No games found</div>';

      // Build dots (desktop only)
      const dotsContainer = document.getElementById('carousel-dots');
      if (window.innerWidth > 900) {
        let dotsHtml = '';
        for (let i = 0; i < totalPages; i++) {
          dotsHtml += `<div class="carousel-dot${i === 0 ? ' active' : ''}" onclick="showPage(${i}); startCarousel();"></div>`;
        }
        dotsContainer.innerHTML = dotsHtml;
      } else {
        dotsContainer.innerHTML = '';
        dotsContainer.style.display = 'none';
      }

      // Start carousel (desktop only)
      currentPage = 0;
      if (window.innerWidth > 900) {
        startCarousel();
      }
    }

    // Update footer
    const now = new Date();
    document.getElementById('footer').textContent =
      `Auto-refreshes every 60 s · Last updated ${now.toLocaleString()}`;

  } catch (err) {
    console.error('Failed to load dashboard:', err);
    document.getElementById('carousel-container').innerHTML =
      `<div class="loading">Error loading data: ${err.message}. Retrying…</div>`;
  }
}

// Click delegation for game cards (handles special chars in names)
document.addEventListener('click', (e) => {
  const card = e.target.closest('.game-card');
  if (card && card.dataset.game) showDetail(card.dataset.game);
});

// Initial load + auto-refresh
loadDashboard();
setInterval(loadDashboard, 60000);
</script>
